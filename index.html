<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>y</title>

<style>


.box{
    width:200px;
    height:200px;
    background-color:rgb(255, 167, 2);
    transition:2s;
    margin-bottom:40px;
}

.box:hover{
    background-color:rgb(0, 255, 85);
    width:300px;
}


.container div{
    width:120px;
    height:120px;
    background-color:rgb(187, 2, 187);
    margin:10px;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:2s;
}

.linear:hover{
    transform:translateX(200px);
    transition-timing-function:linear;
}

.ease:hover{
    transform:translateX(200px);
    transition-timing-function:ease;
}

.easein:hover{
    transform:translateX(200px);
    transition-timing-function:ease-in;
}

.easeout:hover{
    transform:translateX(200px);
    transition-timing-function:ease-out;
}
</style>
</head>
<body>
<h1> 1</h1>
<div class="box"></div>
<h1> 2</h1>
<div class="container">
    <div class="linear">linear</div>
    <div class="ease">ease</div>
    <div class="easein">ease-in</div>
    <div class="easeout">ease-out</div>
</div>
</body>
</html>
